services:
  webserver:
    # image: webserver
    build:
      context: ./webserver
      dockerfile: Dockerfile
    develop:
      watch:
        - path: ./webserver
          action: sync
          target: /app
    ports:
      - 5002:5002
    extra_hosts:
      - "host.docker.internal:host-gateway"

  client:
    # image: client
    build:
      context: ./client
      dockerfile: Dockerfile
    develop:
      watch:
        - path: ./client
          action: sync
          target: /app
    volumes:
     - ./client:/app
    ports:
      - 5173:5173

  db:
    image: postgis/postgis:16-master
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gidb
    volumes:
      - postgis_data:/var/lib/postgresql/data

    ports:
     - 5433:5432

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  postgis_data:
